<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Club Signups</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: "Oswald", sans-serif;
            font-size: 20px;
            background-color: #f8f8f8;
            margin: 20px;
        }

        select, table {
            font-size: 18px;
            padding: 8px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: rgb(72, 28, 28);
            color: white;
        }

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 10px;
            background-color: rgb(72, 28, 28);
            color: white;
            text-decoration: none;
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Club Signups</h1>

    <label>Filter by Club: 
        <select id="clubFilter">
            <option value="All">All</option>
            <option value="Alianti">Bake Club [Baking]</option>
            <option value="Sagala">Sagala [Dance]</option>
            <option value="Volant">Volant [Badminton]</option>
            <option value="Kamalayan">Kamalayan [Filipino Theater]</option>
            <option value="Celluloid">Celluloid [Film]</option>
            <option value="Exposure">Exposure [Photography]</option>
            <option value="Astrosoc">AstroSoc [Astronomy]</option>
        </select>
    </label>

    <div class="message" id="totalSignups"></div>

    <table id="signupTable">
        <thead>
            <tr>
                <th>Student ID</th>
                <th>Full Name</th>
                <th>Birthday</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Grade</th>
                <th>Type</th>
                <th>Club</th>
                <th>Reason</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <a href="Q3_2GPotassiumTuddao.html" class="back-btn">Back to Sign-Up</a>

    <script>
        let signUps = JSON.parse(localStorage.getItem("clubSignUps")) || [];

        const tableBody = document.querySelector("#signupTable tbody");
        const totalMsg = document.getElementById("totalSignups");
        const clubFilter = document.getElementById("clubFilter");

        function renderTable(filter) {
            tableBody.innerHTML = "";

            if(signUps.length === 0) {
                totalMsg.textContent = "";
                tableBody.innerHTML = '<tr><td colspan="9">No sign-ups saved yet.</td></tr>';
                return;
            }

            let filtered = signUps;
            if(filter && filter !== "all") {
                filtered = signUps.filter(s => s.club === filter);
            }

            if(filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9">No sign-ups for this club.</td></tr>';
            } else {
                filtered.forEach(s => {
                    const row = `<tr>
                        <td>${s.studentId}</td>
                        <td>${s.fullName}</td>
                        <td>${s.birthday}</td>
                        <td>${s.email}</td>
                        <td>${s.mobile}</td>
                        <td>${s.grade}</td>
                        <td>${s.type}</td>
                        <td>${s.club}</td>
                        <td>${s.reason}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }

            totalMsg.textContent = `Total Sign-ups: ${filtered.length}`;
        }

       
        renderTable("all");

        clubFilter.addEventListener("change", () => {
            renderTable(clubFilter.value);
        });
    </script>
</body>
</html>
