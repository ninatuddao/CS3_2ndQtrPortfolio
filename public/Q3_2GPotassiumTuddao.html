<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Application Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: "Oswald", sans-serif;
            font-size: 30px;
            background-image: url(bgredfinal.jpg);
            background-repeat: no-repeat; 
            background-size: cover;
            background-position: center; 
        }

        fieldset {
            border: 5px solid rgb(77, 10, 10);
            border-radius: 15px;
            width: 550px;
            margin: auto;
            margin-top: 70px;
            padding: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .buttons input[type="submit"],
        .buttons input[type="reset"],
        .buttons button {
            background-color: rgb(72, 28, 28);
            color: white;
            font-size: 20px;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
        }

        form {
            background-color: #f2f2f2;
            padding: 15px 30px;
            border-radius: 20px;
            width: 620px;
            margin: 20px auto;
        }

        label {
            display: block;
            margin-bottom: 10px
        }

        input, select, textarea {
            font-family: "Oswald", sans-serif;
            font-size: 22px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #999;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border: 3px solid rgb(77, 10, 10);
            background-color: #fff0f0;
        }

        .error {
            border-color: red;
        }
    </style>
</head>
<body>

    <form id="clubForm">
        <!-- Student Information -->
        <fieldset>
            <legend>Student Information</legend>

            <label>
                Student ID:
                <input type="number" name="studentId" required>
            </label>

            <label>
                Full Name:
                <input type="text" name="fullName" required>
            </label>

            <label>
                Birthday:
                <input type="date" name="birthday" required> 
            </label> 

            <label>
                Email Address:
                <input type="email" name="email" required>
            </label>
        </fieldset>

        <!-- Application Details -->
        <fieldset>
            <legend>Application Details</legend>

            <label>
                Mobile Phone Number:
                <input type="text" name="mobile" required> 
            </label>

            <label>
                Grade Level:
                <select name="grade" required>
                    <option value="" disabled selected>Select Grade</option>
                    <option value="g7">Grade 7</option>
                    <option value="g8">Grade 8</option>
                    <option value="g9">Grade 9</option>
                    <option value="g10">Grade 10</option>
                    <option value="g11">Grade 11</option>
                    <option value="g12">Grade 12</option>
                </select>
            </label>

            <label>
                Intern / Extern:
                <input type="radio" name="type" value="intern" required> Intern
                <input type="radio" name="type" value="extern" required> Extern 
            </label>

            <label>
                Choose Club:
                <select name="club" required>
                    <option value="" disabled selected>Select Club</option>
                    <option value="alianti">Bake Club [Baking]</option>
                    <option value="sagala">Sagala [Dance]</option>
                    <option value="himigagham">Volant [Badminton]</option>
                    <option value="kamalayan">Kamalayan [Filipino Theater]</option>
                    <option value="celluloid">Celluloid [Film]</option>
                    <option value="exposure">Exposure [Photography]</option>
                    <option value="atom">AstroSoc [Astronomy]</option> 
                </select>
            </label>

            <label>
                Why do you want to join?
                <textarea name="reason" required rows="5"></textarea>
            </label>
        </fieldset>

        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
            <button type="button" onclick="viewSignUps()">View Signups</button>
        </div>
    </form>

    <script>
        
        function viewSignUps() {
            window.location.href = "viewSignUps.html";
        }

        
        let signUps = JSON.parse(localStorage.getItem("clubSignUps")) || [];

        document.getElementById("clubForm").addEventListener("submit", function(e) {
            e.preventDefault(); 

            if (!confirm("Are you sure you want to submit this application?")) return;

            
            const formData = new FormData(this);
            const entry = {
                studentId: formData.get("studentId"),
                fullName: formData.get("fullName"),
                birthday: formData.get("birthday"),
                email: formData.get("email"),
                mobile: formData.get("mobile"),
                grade: formData.get("grade"),
                type: formData.get("type"),
                club: formData.get("club"),
                reason: formData.get("reason")
            };

            
            signUps.push(entry);

            
            localStorage.setItem("clubSignUps", JSON.stringify(signUps));

            alert("Your application has been saved!");
            this.reset();
        });

        document.getElementById("clubForm").addEventListener("reset", function(e){
            if(!confirm("Are you sure you want to reset the form?")) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
